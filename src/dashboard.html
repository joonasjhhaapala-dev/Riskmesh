<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskMesh Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .stat-value { font-variant-numeric: tabular-nums; }
        .risk-low { color: #4ade80; }
        .risk-med { color: #facc15; }
        .risk-high { color: #f87171; }
        .event-row { border-bottom: 1px solid #1e293b; transition: background 0.2s; }
        .event-row:hover { background: #1e293b; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <span class="text-cyan-400">&#9670;</span> RiskMesh
                    <span class="text-sm font-normal text-slate-400 ml-2">Real-Time Risk Marketplace</span>
                </h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-emerald-400 pulse"></span>
                <span class="text-sm text-slate-400">Live</span>
                <span id="last-update" class="text-xs text-slate-500 ml-2"></span>
            </div>
        </div>

        <!-- Stats cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4 mb-8">
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Transactions</div>
                <div id="stat-transactions" class="text-2xl font-bold text-white stat-value">0</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Policies</div>
                <div id="stat-policies" class="text-2xl font-bold text-emerald-400 stat-value">0</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Claims</div>
                <div id="stat-claims" class="text-2xl font-bold text-red-400 stat-value">0</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Premiums</div>
                <div id="stat-premiums" class="text-2xl font-bold text-amber-400 stat-value">$0</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Coverage</div>
                <div id="stat-coverage" class="text-2xl font-bold text-cyan-400 stat-value">$0</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Payouts</div>
                <div id="stat-payouts" class="text-2xl font-bold text-red-400 stat-value">$0</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Avg Risk</div>
                <div id="stat-avgrisk" class="text-2xl font-bold text-yellow-400 stat-value">0.000</div>
            </div>
        </div>

        <!-- Secondary stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Claims Ratio</div>
                <div id="stat-ratio" class="text-xl font-bold text-orange-400 stat-value">0.0%</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Active Providers</div>
                <div id="stat-providers" class="text-xl font-bold text-purple-400 stat-value">0</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Total Capacity</div>
                <div id="stat-capacity" class="text-xl font-bold text-slate-300 stat-value">$0</div>
            </div>
            <div class="card p-4">
                <div class="text-xs text-slate-400 uppercase tracking-wider mb-1">Used Capacity</div>
                <div id="stat-used" class="text-xl font-bold text-pink-400 stat-value">$0</div>
            </div>
        </div>

        <!-- Main content: Event feed + Active policies -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Event feed -->
            <div class="lg:col-span-2 card p-0 overflow-hidden">
                <div class="px-5 py-3 border-b border-slate-700 flex items-center justify-between">
                    <h2 class="text-sm font-semibold text-white uppercase tracking-wider">Live Activity Feed</h2>
                    <span id="event-count" class="text-xs text-slate-500">0 events</span>
                </div>
                <div id="event-feed" class="overflow-y-auto" style="max-height: 520px;">
                    <div class="text-center text-slate-500 py-12">Waiting for events...</div>
                </div>
            </div>

            <!-- Active policies -->
            <div class="card p-0 overflow-hidden">
                <div class="px-5 py-3 border-b border-slate-700">
                    <h2 class="text-sm font-semibold text-white uppercase tracking-wider">Active Policies</h2>
                </div>
                <div id="policies-list" class="overflow-y-auto p-4 space-y-3" style="max-height: 520px;">
                    <div class="text-center text-slate-500 py-12">No active policies</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let prevEventCount = 0;

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function fmt(n) {
            if (n >= 1_000_000) return '$' + (n / 1_000_000).toFixed(1) + 'M';
            if (n >= 1_000) return '$' + (n / 1_000).toFixed(1) + 'K';
            return '$' + n.toFixed(2);
        }

        function riskClass(score) {
            if (score < 0.3) return 'risk-low';
            if (score < 0.6) return 'risk-med';
            return 'risk-high';
        }

        function eventIcon(type) {
            const icons = {
                assessment: '<span class="text-cyan-400">&#9679;</span>',
                policy_created: '<span class="text-emerald-400">&#9632;</span>',
                claim_filed: '<span class="text-red-400">&#9650;</span>',
                provider_registered: '<span class="text-purple-400">&#9733;</span>',
                offer_expired: '<span class="text-slate-500">&#9711;</span>',
                capacity_exceeded: '<span class="text-orange-400">&#9888;</span>',
            };
            return icons[type] || '<span class="text-slate-400">&#9679;</span>';
        }

        function eventColor(type) {
            const colors = {
                assessment: 'text-slate-300',
                policy_created: 'text-emerald-300',
                claim_filed: 'text-red-300',
                provider_registered: 'text-purple-300',
            };
            return colors[type] || 'text-slate-400';
        }

        async function fetchStats() {
            try {
                const res = await fetch(API + '/stats');
                const s = await res.json();
                document.getElementById('stat-transactions').textContent = s.total_transactions;
                document.getElementById('stat-policies').textContent = s.total_policies;
                document.getElementById('stat-claims').textContent = s.total_claims;
                document.getElementById('stat-premiums').textContent = fmt(s.total_premium_volume);
                document.getElementById('stat-coverage').textContent = fmt(s.total_coverage_volume);
                document.getElementById('stat-payouts').textContent = fmt(s.total_payouts);
                document.getElementById('stat-avgrisk').textContent = s.avg_composite_risk.toFixed(3);
                document.getElementById('stat-ratio').textContent = (s.claims_ratio * 100).toFixed(1) + '%';
                document.getElementById('stat-providers').textContent = s.active_providers;
                document.getElementById('stat-capacity').textContent = fmt(s.total_provider_capacity);
                document.getElementById('stat-used').textContent = fmt(s.used_provider_capacity);

                const avgEl = document.getElementById('stat-avgrisk');
                avgEl.className = 'text-2xl font-bold stat-value ' + riskClass(s.avg_composite_risk);
            } catch (e) {}
        }

        async function fetchEvents() {
            try {
                const res = await fetch(API + '/events?n=40');
                const events = await res.json();
                const feed = document.getElementById('event-feed');
                document.getElementById('event-count').textContent = events.length + ' events';

                if (events.length === 0) return;

                let html = '';
                for (const ev of events) {
                    const ts = ev.timestamp ? ev.timestamp.substring(11, 19) : '';
                    html += `<div class="event-row px-5 py-2.5 flex items-start gap-3 fade-in">
                        <div class="mt-0.5">${eventIcon(ev.type)}</div>
                        <div class="flex-1 min-w-0">
                            <div class="${eventColor(ev.type)} text-sm leading-relaxed">${escapeHtml(ev.message)}</div>
                        </div>
                        <div class="text-xs text-slate-600 whitespace-nowrap">${ts}</div>
                    </div>`;
                }
                feed.innerHTML = html;
            } catch (e) {}
        }

        async function fetchPolicies() {
            try {
                const res = await fetch(API + '/policies?limit=20');
                const data = await res.json();
                const list = document.getElementById('policies-list');

                if (!data.policies || data.policies.length === 0) {
                    list.innerHTML = '<div class="text-center text-slate-500 py-12">No active policies</div>';
                    return;
                }

                let html = '';
                for (const p of data.policies.slice(0, 15)) {
                    html += `<div class="bg-slate-800/50 rounded-lg p-3 text-sm">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-cyan-400 font-mono text-xs">${escapeHtml(p.id)}</span>
                            <span class="text-xs px-2 py-0.5 rounded-full ${
                                p.status === 'active' ? 'bg-emerald-900/50 text-emerald-400' :
                                p.status === 'claimed' ? 'bg-red-900/50 text-red-400' :
                                'bg-slate-700 text-slate-400'
                            }">${p.status}</span>
                        </div>
                        <div class="text-xs text-slate-400">Agent: ${escapeHtml(p.agent_id)}</div>
                        <div class="flex justify-between mt-1">
                            <span class="text-amber-400">Prem: $${p.premium.toFixed(2)}</span>
                            <span class="text-emerald-400">Cov: $${p.coverage.toFixed(0)}</span>
                        </div>
                    </div>`;
                }
                list.innerHTML = html;
            } catch (e) {}
        }

        function updateTime() {
            document.getElementById('last-update').textContent =
                'Updated: ' + new Date().toLocaleTimeString();
        }

        async function refresh() {
            await Promise.all([fetchStats(), fetchEvents(), fetchPolicies()]);
            updateTime();
        }

        // Initial load + polling every 2 seconds
        refresh();
        setInterval(refresh, 2000);
    </script>
</body>
</html>
